name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e .[dev]

      - name: Run tests
        run: python -m pytest

      - name: Run doctor
        run: python -m agent_runtime.cli doctor

      - name: Run ledger CLI smoke checks
        run: |
          python -m agent_runtime.cli task validate --record-file tasks/tasks.jsonl --schema task
          python -m agent_runtime.cli task validate --record-file tasks/events.jsonl --schema event
          python -m agent_runtime.cli task check-ledger --tasks-file tasks/tasks.jsonl --events-file tasks/events.jsonl

      - name: Run controlled write regression tests
        run: python -m pytest tests/test_controlled_write_regression.py -q

      - name: Run public scan
        run: python tools/public_scan.py
